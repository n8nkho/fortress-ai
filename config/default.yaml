# Fortress AI default configuration (env vars override these values).
# Reviewed and set 2026-06-20 — unified AI Mind + dashboard + tunable overrides aligned at 0.85.
FORTRESS_AI_MIN_CONFIDENCE: 0.85
FORTRESS_AI_CONFIDENCE_FLOOR_LOCK: 1
FORTRESS_AI_DOMAIN_LLM_LEARN: 1
FORTRESS_INGEST_READ_ONLY: 0
FORTRESS_SI_AUTO_CODE: 1
FORTRESS_SI_AUTO_CODE_MAX_PER_DAY: 2
FORTRESS_SI_AUTO_CODE_REQUIRE_E2E: 1
FORTRESS_SI_AUTO_COMMIT: false
FORTRESS_SI_AUTO_PUSH: false
FORTRESS_SI_RSI_AUTO_COMMIT: 1
FORTRESS_SI_RSI_AUTO_PUSH: 1
FORTRESS_SI_AUTO_APPROVE: false
FORTRESS_RTH_SI_INTERVAL_SEC: 900
FORTRESS_MAX_ORDER_NOTIONAL_USD: 50000
FORTRESS_MAX_POSITION_NOTIONAL_USD: 100000
MAX_POSITION_SIZE_PER_SYMBOL: 100000
ENFORCE_POSITION_DEDUPLICATION: true
POSITION_DEDUPLICATION_ENABLED: true
FLATTEN_LEGACY_ON_STARTUP: true
MARKET_RELATIVE_GATE_ENABLED: true
MARKET_RELATIVE_GATE_MAX_UNDERPERFORMANCE_PCT: -0.5
MARKET_RELATIVE_GATE_LOOKBACK_MINUTES: 60
MARKET_RELATIVE_GATE_COOLDOWN_SECONDS: 3600
# Operator status loop — reconcile broker vs swarm ledger (orphan close + stale mark).
FORTRESS_RECONCILE_BROKER_LEDGER: 1
FORTRESS_RECONCILE_BROKER_LEDGER_COOLDOWN_SEC: 60
