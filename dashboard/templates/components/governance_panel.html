<section class="fai-v2-card p-4 mt-4 border border-slate-600/40" id="fai-governance">
  <div class="flex flex-wrap justify-between items-start gap-3 mb-3">
    <div>
      <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">🏛️ Governance (tiers 0–3)</h2>
      <p class="text-[11px] text-slate-500 mt-1 max-w-3xl">
        Tier 0–1 parameter routing uses <code class="fai-text-mono text-[10px]">utils/improvement_governance.py</code>.
        Tier 2 prompts → Self-improvement prompt section. Tier 3 is immutable (blocked).
      </p>
    </div>
    <div class="flex flex-wrap gap-2">
      <button type="button" @click="fetchGovernance()"
        class="px-2.5 py-1 rounded-lg bg-slate-700/90 hover:bg-slate-600 text-xs text-slate-100">Refresh</button>
      <button type="button" @click="processGovernanceVetoWindows()"
        class="px-2.5 py-1 rounded-lg bg-slate-800 text-xs text-slate-400 hover:text-slate-200">Process veto windows</button>
      <button type="button" @click="fetchGovernanceTiers()"
        class="px-2.5 py-1 rounded-lg border border-slate-600 text-xs text-slate-300">Show tiers</button>
    </div>
  </div>

  <template x-if="govError">
    <p class="text-xs text-red-300 mb-2" x-text="govError"></p>
  </template>

  <template x-if="govVetoPending && govVetoPending.proposal_id">
    <div class="rounded-xl border border-amber-500/25 bg-amber-950/15 p-4 mb-3 text-xs">
      <p class="text-amber-200 font-semibold mb-1">Tier 1 — veto window</p>
      <p class="text-slate-400 mb-2"
        x-text="'Deadline: ' + (govVetoPending.veto_deadline || '—')"></p>
      <p class="text-slate-300 mb-2" x-text="govVetoPending.proposal && govVetoPending.proposal.reasoning"></p>
      <div class="flex flex-wrap gap-2">
        <button type="button" @click="vetoGovernanceProposal(govVetoPending.proposal_id)"
          class="px-3 py-1.5 rounded-lg bg-red-900/50 text-red-100 text-xs border border-red-500/30">Veto</button>
      </div>
    </div>
  </template>

  <details class="group">
    <summary class="cursor-pointer text-xs text-slate-500 hover:text-slate-300">Tier map / criteria</summary>
    <pre class="mt-2 text-[10px] text-slate-500 overflow-x-auto max-h-48 fai-text-mono" x-text="JSON.stringify(govTiers || {}, null, 2)"></pre>
  </details>
</section>
