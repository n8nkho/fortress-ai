<section class="fai-v2-card p-4 fai-slide-in space-y-4">
  <h2 class="text-sm font-semibold text-cyan-300 uppercase tracking-wider flex items-center gap-2 flex-wrap">
    💭 AI Mind <span class="text-xs font-normal text-slate-500 normal-case">live reasoning</span>
    <template x-if="(state.ui_status || '') === 'THINKING'">
      <span class="text-xs text-purple-400 normal-case flex items-center">AI is thinking<span class="fai-thinking-dots"><span></span><span></span><span></span></span></span>
    </template>
  </h2>

  <div class="rounded-xl border border-white/10 bg-black/20 p-4 min-h-[120px]">
    <p class="text-xs text-purple-300 mb-2 font-medium">Market assessment</p>
    <p class="text-sm text-slate-200 leading-relaxed" x-text="state.market_assessment || 'Awaiting next reasoning cycle…'"></p>
    <template x-if="state.reasoning">
      <div class="mt-3 pt-3 border-t border-white/10">
        <p class="text-xs text-slate-500 mb-1">Chain of thought</p>
        <p class="text-sm text-slate-300 leading-relaxed fai-text-mono text-[13px]" x-text="state.reasoning"></p>
      </div>
    </template>
  </div>

  <div class="rounded-xl border border-white/10 bg-black/25 p-3">
    <div class="flex justify-between text-xs text-slate-400 mb-2 items-center flex-wrap gap-2">
      <span class="fai-tip" title="Model-reported confidence for the latest parsed decision (0–100%). Higher suggests stronger alignment with internal criteria — not a guarantee of outcomes.">Confidence</span>
      <div class="flex items-center gap-2">
        <span class="text-[10px] uppercase tracking-wide text-slate-500">Low</span>
        <span class="text-[10px] uppercase tracking-wide text-slate-500">Med</span>
        <span class="text-[10px] uppercase tracking-wide text-slate-500">High</span>
      </div>
      <span class="fai-text-mono text-cyan-300" x-text="Math.round((state.confidence || 0) * 100) + '%'"></span>
    </div>
    <div class="fai-confidence-v2" :class="confidenceHigh() ? 'fai-confidence-high' : ''">
      <div class="fai-confidence-fill-v2" :style="'width:' + confidenceWidth()"></div>
    </div>
    <p class="text-xs text-slate-500 mt-2">
      Zone: <span class="text-slate-300" x-text="confidenceZoneLabel()"></span>
      <template x-if="state.agent_schedule?.manual_only">
        <span> · <span class="text-amber-200/90">No auto cadence</span> · <span class="text-slate-400" x-text="nextDecisionEta()"></span></span>
      </template>
      <template x-if="!state.agent_schedule?.manual_only">
        <span> · Next cycle ETA · <span class="text-slate-300" x-text="nextDecisionEta()"></span></span>
      </template>
    </p>
  </div>

  <div class="rounded-xl border border-white/10 bg-black/20 p-3">
    <div class="flex justify-between items-center mb-2">
      <h3 class="text-xs font-semibold text-slate-300 uppercase tracking-wider">🧠 Learning progress</h3>
      <span class="text-xs text-slate-500 fai-text-mono" x-text="learningPct() + '%'"></span>
    </div>
    <div class="h-2 rounded-full bg-white/10 overflow-hidden">
      <div class="h-full rounded-full bg-gradient-to-r from-purple-600 to-cyan-400 transition-all duration-700" :style="'width:' + learningPct() + '%'"></div>
    </div>
    <p class="text-xs text-slate-500 mt-2">
      <span x-text="totalDecisions()"></span> decisions in recent log ·
      <span x-text="patternsLearned()"></span> belief keys
    </p>
  </div>

  <div x-show="expertMode" x-transition class="rounded-lg bg-black/40 p-3 border border-orange-500/20">
    <p class="text-xs text-orange-300 mb-2">Expert · latest metric JSON</p>
    <pre class="text-[11px] overflow-auto max-h-48 text-emerald-200/90 fai-scroll" x-text="JSON.stringify(state.latest_metric, null, 2)"></pre>
  </div>

  <details class="group rounded-xl border border-white/10 bg-black/15 px-3 py-2 open:border-cyan-500/25">
    <summary class="cursor-pointer text-sm text-slate-400 hover:text-cyan-300 list-none flex items-center gap-2">
      🧠 AI memory <span class="text-xs">(<span x-text="beliefsPatterns().length"></span> patterns)</span>
    </summary>
    <ul class="mt-3 space-y-3 max-h-48 overflow-y-auto fai-scroll">
      <template x-if="beliefsPatterns().length === 0">
        <li class="text-slate-500 text-xs">No persisted beliefs yet.</li>
      </template>
      <template x-for="pat in beliefsPatterns()" :key="pat.key">
        <li class="rounded-lg border border-purple-500/20 bg-purple-950/20 p-2 text-xs">
          <span class="text-purple-300">💡</span>
          <span class="text-slate-200 font-medium" x-text="pat.description"></span>
          <div class="mt-1 flex flex-wrap gap-2 text-[11px] text-slate-500">
            <template x-if="pat.confidence != null">
              <span>Confidence: <span class="text-slate-300" x-text="pat.confidence + '%'"></span></span>
            </template>
            <template x-if="pat.usageCount != null">
              <span>Uses: <span class="text-slate-300" x-text="pat.usageCount"></span></span>
            </template>
          </div>
        </li>
      </template>
    </ul>
  </details>

  <div>
    <h3 class="text-xs font-semibold text-slate-400 uppercase mb-2">Recent decisions</h3>
    <ul class="space-y-2 max-h-56 overflow-y-auto fai-scroll">
      <template x-for="row in recentFive()" :key="(rowTime(row) || '') + (row.decision?.action || row.error || '')">
        <li class="fai-decision-row rounded-lg bg-white/5 p-3 text-xs border border-white/5 cursor-pointer"
          @click="openDetail(row)">
          <div class="flex justify-between gap-2 flex-wrap">
            <span class="text-slate-500 fai-text-mono" x-text="fmtTime(rowTime(row))"></span>
            <span class="text-cyan-200 font-medium" x-text="row.decision?.action || row.error || 'event'"></span>
            <span class="text-slate-500" x-text="row.decision?.confidence != null ? (Math.round(Number(row.decision.confidence) * 100) + '%') : ''"></span>
          </div>
          <p class="text-slate-400 mt-1 line-clamp-2" x-text="decisionPreview(row)"></p>
          <p class="text-[10px] text-cyan-500/80 mt-1">Open detail →</p>
        </li>
      </template>
      <template x-if="recentFive().length === 0">
        <li class="text-slate-500 text-xs">No decisions logged yet. Run the unified agent.</li>
      </template>
    </ul>
  </div>
</section>
