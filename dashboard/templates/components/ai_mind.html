<section class="fai-glass p-4 fai-slide-in space-y-4">
  <h2 class="text-sm font-semibold text-cyan-300 uppercase tracking-wider flex items-center gap-2">
    💭 AI Mind <span class="text-xs font-normal text-slate-500 normal-case">live reasoning</span>
  </h2>

  <div class="rounded-xl border border-white/10 bg-black/20 p-4 min-h-[140px]">
    <p class="text-xs text-purple-300 mb-2 font-medium">Market assessment</p>
    <p class="text-sm text-slate-200 leading-relaxed" x-text="state.market_assessment || 'Awaiting next reasoning cycle…'"></p>
    <template x-if="state.reasoning">
      <div class="mt-3 pt-3 border-t border-white/10">
        <p class="text-xs text-slate-500 mb-1">Chain of thought</p>
        <p class="text-sm text-slate-300 leading-relaxed fai-text-mono text-[13px]" x-text="state.reasoning"></p>
      </div>
    </template>
  </div>

  <div>
    <div class="flex justify-between text-xs text-slate-400 mb-1">
      <span>Confidence</span>
      <span class="fai-text-mono text-cyan-300" x-text="Math.round((state.confidence || 0) * 100) + '%'"></span>
    </div>
    <div class="fai-confidence-track">
      <div class="fai-confidence-fill" :style="'width:' + confidenceWidth()"></div>
    </div>
    <p class="text-xs text-slate-500 mt-2">
      Next cycle ETA · <span class="text-slate-300" x-text="nextDecisionEta()"></span>
    </p>
  </div>

  <div x-show="expertMode" x-transition class="rounded-lg bg-black/40 p-3 border border-orange-500/20">
    <p class="text-xs text-orange-300 mb-2">Expert · latest metric JSON</p>
    <pre class="text-[11px] overflow-auto max-h-48 text-emerald-200/90 fai-scroll" x-text="JSON.stringify(state.latest_metric, null, 2)"></pre>
  </div>

  <details class="group">
    <summary class="cursor-pointer text-sm text-slate-400 hover:text-cyan-300 list-none flex items-center gap-2">
      🧠 AI memory <span class="text-xs">(beliefs)</span>
    </summary>
    <ul class="mt-3 space-y-2 text-sm text-slate-300 max-h-40 overflow-y-auto fai-scroll">
      <template x-if="beliefsList().length === 0">
        <li class="text-slate-500 text-xs">No persisted beliefs yet.</li>
      </template>
      <template x-for="[k, v] in beliefsList()" :key="k">
        <li class="border-l-2 border-purple-500/50 pl-2">
          <span class="text-purple-300 fai-text-mono text-xs" x-text="k"></span>:
          <span x-text="typeof v === 'object' ? JSON.stringify(v) : v"></span>
        </li>
      </template>
    </ul>
  </details>

  <div>
    <h3 class="text-xs font-semibold text-slate-400 uppercase mb-2">Recent decisions</h3>
    <ul class="space-y-2 max-h-56 overflow-y-auto fai-scroll">
      <template x-for="row in recentFive()" :key="(rowTime(row) || '') + (row.decision?.action || row.error || '')">
        <li class="rounded-lg bg-white/5 p-2 text-xs border border-white/5 hover:border-cyan-500/30 cursor-pointer transition-colors"
          @click="openDetail(row)">
          <span class="text-slate-500 fai-text-mono" x-text="fmtTime(rowTime(row))"></span>
          <span class="text-cyan-200 ml-2" x-text="row.decision?.action || row.error || 'event'"></span>
          <p class="text-slate-400 mt-1 line-clamp-2" x-text="decisionSummary(row)"></p>
        </li>
      </template>
      <template x-if="recentFive().length === 0">
        <li class="text-slate-500 text-xs">No decisions logged yet. Run the unified agent.</li>
      </template>
    </ul>
  </div>
</section>
