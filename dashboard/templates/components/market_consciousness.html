<section id="fai-market-consciousness" class="fai-v2-card p-4 fai-slide-in space-y-3 border border-cyan-500/25 bg-cyan-950/15">
  <div class="flex flex-wrap items-start justify-between gap-2">
    <h2 class="text-sm font-semibold text-cyan-300 uppercase tracking-wider">🧠 Market consciousness</h2>
    <span class="text-[10px] text-slate-500 fai-text-mono" x-text="consciousnessAgeLabel()"></span>
  </div>

  <p class="text-xs text-slate-400 leading-relaxed" x-show="!state.market_consciousness?.enabled">
    Consciousness bundle loading…
  </p>
  <p class="text-[10px] text-amber-300/90" x-show="state.market_consciousness?.error" x-text="state.market_consciousness?.error"></p>

  <template x-if="state.market_consciousness?.enabled">
    <div class="space-y-3 text-xs">
      <div class="rounded-lg border border-white/10 bg-black/25 p-3">
        <p class="text-[10px] text-slate-500 uppercase mb-1">Session intent</p>
        <p class="text-cyan-100 leading-relaxed" x-text="state.market_consciousness?.session_intent?.plan_line || '—'"></p>
        <p class="text-slate-500 mt-1">
          Target: <span class="text-slate-300" x-text="state.market_consciousness?.session_intent?.participation_target || '—'"></span>
          · Posture: <span class="text-slate-300" x-text="state.market_consciousness?.consciousness_posture?.mode || '—'"></span>
        </p>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div class="rounded-lg border border-white/10 bg-black/20 p-2">
          <p class="text-[10px] text-slate-500">Slot (ET)</p>
          <p class="fai-text-mono text-slate-200" x-text="state.market_consciousness?.temporal?.slot_key || 'closed'"></p>
        </div>
        <div class="rounded-lg border border-white/10 bg-black/20 p-2">
          <p class="text-[10px] text-slate-500">Alpha vs SPY</p>
          <p class="fai-text-mono"
            :class="(state.market_consciousness?.self_state?.alpha_vs_spy_pct ?? 0) >= 0 ? 'text-emerald-300' : 'text-red-300'"
            x-text="fmtAlphaPct(state.market_consciousness?.self_state?.alpha_vs_spy_pct)"></p>
        </div>
        <div class="rounded-lg border border-white/10 bg-black/20 p-2">
          <p class="text-[10px] text-slate-500">Tape / VIX regime</p>
          <p class="text-slate-300" x-text="(state.market_consciousness?.market_tape?.tape_trend || '—') + ' · ' + (state.market_consciousness?.vix_regime || '—')"></p>
        </div>
        <div class="rounded-lg border border-white/10 bg-black/20 p-2">
          <p class="text-[10px] text-slate-500">Session activity</p>
          <p class="text-slate-300">
            <span x-text="state.market_consciousness?.session_diary?.entries_executed ?? 0"></span> in /
            <span x-text="state.market_consciousness?.session_diary?.exits_executed ?? 0"></span> out
          </p>
        </div>
      </div>

      <div x-show="(state.market_consciousness?.analogue_days || []).length" class="rounded-lg border border-white/10 bg-black/20 p-2">
        <p class="text-[10px] text-slate-500 uppercase mb-1">Analogue days</p>
        <ul class="text-[10px] text-slate-400 space-y-0.5 fai-text-mono">
          <template x-for="a in (state.market_consciousness?.analogue_days || []).slice(0, 5)" :key="a.date">
            <li x-text="a.date + ' · SPY ' + (a.spy_return_1d_pct >= 0 ? '+' : '') + a.spy_return_1d_pct + '%'"></li>
          </template>
        </ul>
      </div>

      <div x-show="(state.market_consciousness?.market_events?.events || []).length" class="rounded-lg border border-amber-500/20 bg-amber-950/20 p-2">
        <p class="text-[10px] text-amber-200/80 uppercase mb-1">Today's events</p>
        <ul class="text-[10px] text-amber-100/90 space-y-0.5">
          <template x-for="(ev, i) in (state.market_consciousness?.market_events?.events || [])" :key="i">
            <li x-text="ev.label"></li>
          </template>
        </ul>
      </div>

      <p class="text-[10px] text-slate-500 fai-text-mono" x-show="state.market_consciousness?.counterfactual_hint?.hint"
        x-text="state.market_consciousness?.counterfactual_hint?.hint"></p>

      <p class="text-[10px] text-fuchsia-300/80" x-show="state.market_consciousness?.proactive_si_trigger?.triggered">
        Proactive SI: participation gap detected
      </p>
    </div>
  </template>
</section>
