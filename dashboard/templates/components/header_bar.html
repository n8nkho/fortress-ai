<header class="fai-glass-strong px-4 py-3 mb-4 sticky top-0 z-40">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <span class="text-2xl" aria-hidden="true">🤖</span>
      <div>
        <div class="flex items-center gap-2 flex-wrap">
          <h1 class="text-lg font-semibold tracking-tight fai-text-mono fai-glow-cyan" x-text="state.instance || 'Fortress-AI'"></h1>
          <span class="text-xs px-2 py-0.5 rounded-full border border-cyan-500/40 text-cyan-300 fai-text-mono" x-text="state.dry_run ? 'DRY-RUN' : 'AUTONOMOUS'"></span>
          <span class="text-[10px] px-2 py-0.5 rounded-full border border-cyan-400/45 bg-cyan-950/55 text-cyan-200 fai-text-mono font-semibold shrink-0" title="Dashboard bundle (charts, expert APIs, V2 layout)">UI v2</span>
          <span class="text-[10px] px-2 py-0.5 rounded-md border border-amber-500/50 bg-amber-950/55 text-amber-100 fai-text-mono font-semibold shrink-0 select-all" title="Deploy stamp from server (FORTRESS_AI_DASHBOARD_BUILD or default)">{{ ui_build|default('?') }}</span>
          <span class="relative inline-flex items-center text-xs font-semibold uppercase tracking-wider fai-text-mono px-3 py-1 rounded-full border border-white/10 overflow-visible"
            :class="statusBadgeClass()">
            <span class="fai-status-pulse-ring" aria-hidden="true"></span>
            <span class="relative z-10" x-text="state.ui_status || 'WAITING'"></span>
          </span>
        </div>
        <p class="text-xs text-slate-400 mt-0.5 flex flex-wrap items-center gap-1">
          <span x-text="fmtTime(state.timestamp_utc || new Date().toISOString())"></span>
          <span>·</span>
          <span class="fai-tip" title="Inferred from last cycle / metrics">Neural state</span>
          <template x-if="(state.ui_status || '') === 'THINKING'">
            <span class="fai-thinking-dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </template>
        </p>
      </div>
    </div>

    <div class="flex flex-wrap items-center gap-4 fai-text-mono text-sm">
      <div>
        <span class="text-slate-500 text-xs block">Portfolio</span>
        <span class="text-emerald-400 font-semibold" x-text="equityDisplay()"></span>
      </div>
      <div>
        <span class="text-slate-500 text-xs block">API today</span>
        <span class="text-amber-300" x-text="'$' + (state.today_llm_spend_usd ?? 0).toFixed(3)"></span>
      </div>
      <div class="flex items-center gap-2" :class="statusClass()">
        <span class="fai-status-dot" aria-hidden="true"></span>
        <span class="text-xs uppercase tracking-wider text-slate-300" x-text="state.ui_status"></span>
      </div>
    </div>

    <div class="flex flex-wrap gap-2 w-full md:w-auto justify-end">
      <button type="button" @click="postHalt(true)"
        class="px-3 py-1.5 rounded-lg bg-red-600/90 hover:bg-red-500 text-white text-sm font-medium transition-colors">
        🛑 Halt
      </button>
      <button type="button" @click="comparisonOpen = true; fetchComparison()"
        class="px-3 py-1.5 rounded-lg bg-indigo-600/80 hover:bg-indigo-500 text-white text-sm transition-colors inline-flex items-center gap-1.5">
        📊 Classic
        <span x-show="comparisonOpen" class="text-emerald-300 text-xs" title="Panel open">✓</span>
      </button>
      <button type="button" @click="toggleExpert()"
        class="px-3 py-1.5 rounded-lg border border-slate-600 hover:border-cyan-500/60 text-sm transition-colors"
        :class="expertMode ? 'bg-cyan-900/40 border-cyan-500/50' : ''">
        🔧 Expert
      </button>
      <button type="button" @click="exportBundle()"
        class="px-3 py-1.5 rounded-lg bg-slate-700/80 hover:bg-slate-600 text-sm transition-colors">
        📥 Export
      </button>
    </div>

    <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-xs text-slate-400 border-t border-white/10 pt-3 mt-2 w-full">
      <p class="text-slate-500 max-w-3xl leading-snug">
        <template x-if="state.agent_schedule?.manual_only">
          <span><span class="text-amber-300/95 font-medium">Manual-only mode</span>
          (<span class="fai-text-mono">FORTRESS_AI_MANUAL_ONLY=1</span>) — no automatic cycles even in RTH. Use
          <span class="fai-text-mono text-cyan-400/90">Run AI cycle now</span>.</span>
        </template>
        <template x-if="!state.agent_schedule?.manual_only">
          <span><span class="text-slate-400">Outside Mon–Fri 9:30–4:00 PM ET</span>, the agent <span class="text-cyan-400/95 font-medium">does not</span> run scheduled cycles — use
          <span class="fai-text-mono text-cyan-400/90">Run AI cycle now</span> for off-hours. During RTH it loops per <span class="fai-text-mono">FORTRESS_AI_LOOP_SECONDS</span>.</span>
        </template>
      </p>
      <button type="button" @click="requestCycleNow()"
        class="px-2.5 py-1 rounded-lg bg-slate-700/90 hover:bg-slate-600 text-slate-100 text-xs transition-colors shrink-0">
        ▶ Run AI cycle now
      </button>
      <span class="text-slate-600 hidden lg:inline shrink-0"
        x-text="state.agent_schedule?.manual_only ? 'Manual-only: no auto cadence' : (state.us_equity_rth ? 'RTH: cadence from FORTRESS_AI_LOOP_SECONDS (.env)' : 'Off-hours: on-demand only')"></span>
    </div>
  </div>
</header>
